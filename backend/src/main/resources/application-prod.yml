spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    show-sql: false

server:
  forward-headers-strategy: framework

logging:
  level:
    com.print3dmanager.erp: INFO
    org.hibernate.SQL: WARN
